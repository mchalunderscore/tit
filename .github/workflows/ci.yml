name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: cargo --version
      - run: cargo install --locked cargo-deny --version 0.20.2
      - run: ./scripts/check

  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: cargo --version
      - run: cargo test --locked --all-targets --all-features
      - run: cargo test --locked --release --test auth --test ssh
      - run: cargo test --locked --release --test git_repository --test git_http --test git_ssh
      - run: cargo test --locked --release --test sqlite_workload -- --ignored --nocapture
      - run: cargo build --locked --release
      - run: wc -c target/release/tit
