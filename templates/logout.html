{% extends "base.html" %}
{% block title %}Log out · tit{% endblock %}
{% block content %}
  <h1>Log out</h1>
  <p>Log out of all browser sessions for this account?</p>

    <input type="hidden" name="csrf" value="{{ csrf }}">
    <button type="submit">Log out</button>
  </form>
{% endblock %}
